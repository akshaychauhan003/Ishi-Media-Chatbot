<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="./favicon.png">
    <link rel="apple-touch-icon" href="./favicon.png">

    <title>ISHI MEDIA - AI Support Bot</title>

    <link rel="stylesheet" href="./botcss.css">
</head>

<body>
    <div class="chat-container">
        <div class="chat-header">
            <h1>🤖 ISHI MEDIA</h1>
            <p>Your Digital Transformation Partner</p>
        </div>

        <div class="quick-replies" id="faqButtons"></div>

        <div class="chat-messages" id="chatMessages"></div>

        <div class="chat-input-area">
            <textarea 
                class="input-field" 
                id="messageInput" 
                placeholder="Type your message or use menu..." 
                rows="1"
            ></textarea>

            <button class="send-btn" id="sendBtn" title="Send message">
                ➤
            </button>
        </div>
    </div>

    <div class="color-pop pop-1"></div>
    <div class="color-pop pop-2"></div>
    <div class="color-pop pop-3"></div>

    <script src="./botjs.js"></script>
</body>
</html>
